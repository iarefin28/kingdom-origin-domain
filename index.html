<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Kingdom</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
</head>
<body class="page-home">
  <main class="home-shell">
    <header class="brand-row">
      <span class="brand-mark">K</span>
      <span class="brand-name">Kingdom</span>
    </header>

    <h1 class="hero-title">kingdom-origin-domain</h1>
    <p class="hero-copy">Your search index for world simulations.</p>

    <form id="searchForm" class="search-form">
      <input id="searchInput" class="search-input" type="text" placeholder="Type your key" autocomplete="off" />
      <button class="search-button" type="submit">Search</button>
    </form>

    <p id="feedback" class="feedback" aria-live="polite"></p>

    <div class="quick-actions">
      <button type="button" class="quick-chip" data-query="Verse Calculator">Verse Calculator</button>
    </div>
  </main>

  <script>
    (function () {
      var form = document.getElementById("searchForm");
      var input = document.getElementById("searchInput");
      var feedback = document.getElementById("feedback");
      var chips = document.querySelectorAll(".quick-chip");
      var joeKey = "koVLi:8889:Joe:Bravo:America";

      function runSearch(query) {
        var trimmed = query.trim();
        var normalized = trimmed.toLowerCase();
        if (!trimmed) {
          feedback.textContent = "Enter a search query.";
          return;
        }
        if (
          trimmed === joeKey ||
          normalized === "joe" ||
          normalized === "model for joe" ||
          normalized === "website model for joe"
        ) {
          window.location.href = "meal-joe.html";
          return;
        }
        if (normalized === "verse calculator" || normalized === "luke 17:21" || normalized === "luke 17 21") {
          window.location.href = "luke-17-21.html";
          return;
        }
        feedback.textContent = "No match. Use your key.";
      }

      form.addEventListener("submit", function (event) {
        event.preventDefault();
        runSearch(input.value);
      });

      chips.forEach(function (chip) {
        chip.addEventListener("click", function () {
          var query = chip.getAttribute("data-query") || "";
          input.value = query;
          runSearch(query);
        });
      });
    })();
  </script>
</body>
</html>
